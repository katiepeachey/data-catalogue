<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kernel AI – Datapoint Catalogue</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f6f6;
      color: #343539;
      min-height: 100vh;
    }

    /* -- Navbar -- */
    .navbar {
      background: #fff;
      border-bottom: 1px solid #eaebee;
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-brand { display: flex; align-items: center; gap: 16px; }
    .navbar-logo { height: 28px; width: auto; display: block; }
    .brand-divider { width: 1px; height: 20px; background: #eaebee; }
    .brand-sub { font-size: 11px; color: #a1a1a2; letter-spacing: 0.06em; text-transform: uppercase; }
    .navbar-actions { display: flex; align-items: center; gap: 24px; }
    .nav-link { font-size: 13px; color: #343539; text-decoration: none; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: color 0.15s; }
    .nav-link:hover { color: #98a59c; }
    .nav-link svg { width: 15px; height: 15px; opacity: 0.6; }
    .btn-text {
      font-size: 13px; color: #a1a1a2; text-decoration: none;
      font-weight: 500; transition: color 0.15s;
    }
    .btn-text:hover { color: #343539; }
    .btn-admin {
      display: inline-flex; align-items: center;
      background: #b5c4b6; color: #343539;
      border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 13px; font-weight: 600;
      font-family: inherit; text-decoration: none; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-admin:hover { opacity: 0.88; }

    /* -- Page -- */
    .page-body { padding: 28px; }

    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: #aaa; pointer-events: none; }
    .search-input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid #eaebee; border-radius: 8px; font-size: 13px; background: #fff; color: #343539; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .search-input:focus { border-color: #b5c4b6; box-shadow: 0 0 0 3px rgba(152,165,156,0.15); }
    .filter-select { padding: 9px 14px; border: 1px solid #eaebee; border-radius: 8px; font-size: 13px; background: #fff; color: #343539; outline: none; cursor: pointer; }
    .filter-select:focus { border-color: #b5c4b6; }

    .stats-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-pill { background: #fff; border: 1px solid #eaebee; border-radius: 20px; padding: 6px 16px; font-size: 13px; font-weight: 500; color: #343539; display: flex; align-items: center; gap: 8px; }
    .stat-pill .count { background: #e2ede3; color: #343539; border-radius: 10px; padding: 1px 8px; font-size: 12px; font-weight: 700; }

    /* -- Card / Table -- */
    .card { background: #fff; border-radius: 12px; border: 1px solid #eaebee; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .table-scroll { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 860px; }

    thead th { background: #fff; color: #999; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 16px; text-align: left; border-bottom: 1px solid #eaeeea; white-space: nowrap; }

    /* -- Category header rows -- */
    tr.cat-row td { padding: 0; border-top: 1px solid #e8ece8; border-bottom: 1px solid #e8ece8; }
    .cat-row-inner { padding: 10px 16px 8px; background: #f7faf7; }
    .cat-label { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #2d7a4f; }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; opacity: 0.8; flex-shrink: 0; }
    .cat-count { border-radius: 8px; padding: 1px 7px; font-size: 11px; font-weight: 700; }

    /* -- Data rows -- */
    tr.data-row td { padding: 14px 16px; vertical-align: top; border-bottom: 1px solid #f0f2f0; font-size: 13px; line-height: 1.5; }
    tr.data-row:last-child td { border-bottom: none; }
    tr.data-row:hover td { background: #fafcfa; }

    .dp-name { font-weight: 600; color: #343539; font-size: 13px; }
    .dp-desc { font-size: 12.5px; color: #666; line-height: 1.55; }

    /* -- Sub-label chips -- */
    .sub-labels { display: flex; flex-wrap: wrap; gap: 4px; }
    .sub-label {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      border-radius: 20px; padding: 3px 9px;
      white-space: nowrap; line-height: 1.4;
      cursor: pointer; transition: opacity 0.15s;
    }
    .sub-label:hover { opacity: 0.75; }

    /* 13 label colours */
    .lbl-company-identity        { background: #f0f6f1; color: #343539; border: 1px solid #c8d5c9; }
    .lbl-location-geography      { background: #fff8e8; color: #8a5c00; border: 1px solid #f0d080; }
    .lbl-corporate-structure     { background: #f3eefb; color: #6a3fa0; border: 1px solid #d5c0ef; }
    .lbl-financial-profile       { background: #fff3e8; color: #c06c1a; border: 1px solid #f5c88a; }
    .lbl-technology-infrastructure { background: #eef2fc; color: #3a5fa0; border: 1px solid #b8c8ef; }
    .lbl-sales-marketing         { background: #fbeef8; color: #8a2d7a; border: 1px solid #e8b0d8; }
    .lbl-workforce-people        { background: #f0f6f1; color: #343539; border: 1px solid #c8d5c9; }
    .lbl-hiring-talent           { background: #fbeee8; color: #a03a3a; border: 1px solid #f0b8a0; }
    .lbl-customer-support        { background: #edf4ff; color: #2a5faa; border: 1px solid #b8d0f5; }
    .lbl-compliance-risk         { background: #fdf4e8; color: #9a5a10; border: 1px solid #f0cc90; }
    .lbl-ecommerce-retail        { background: #f0f8ff; color: #2a6a9a; border: 1px solid #a8d0ef; }
    .lbl-operations              { background: #f5f5f5; color: #555; border: 1px solid #d8d8d8; }
    .lbl-industry-market         { background: #fff0f5; color: #a03060; border: 1px solid #f0b8cc; }

    .sub-label.active-filter { outline: 2px solid currentColor; outline-offset: 1px; }

    /* -- Output fields -- */
    .fields-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 3px; }
    .field-tag { display: inline-block; font-size: 12px; color: #343539; background: #f0f6f1; border: 1px solid #c8d5c9; border-radius: 4px; padding: 2px 7px; width: fit-content; }

    /* -- Possible values chips -- */
    .value-chip {
      display: inline-flex; font-size: 10px; font-weight: 600;
      background: #f0f2f0; color: #555; border: 1px solid #e0e4e0;
      border-radius: 10px; padding: 2px 8px; white-space: nowrap;
    }
    .value-chip-hidden { display: none; }
    .value-chip.overflow { background: #eef2fc; color: #3a5fa0; border-color: #b8c8ef; cursor: pointer; transition: opacity 0.15s; }
    .value-chip.overflow:hover { opacity: 0.75; }
    .values-cell { display: flex; flex-wrap: wrap; gap: 4px; align-items: flex-start; }
    .data-type-label { font-size: 11px; color: #aaa; font-style: italic; }

    /* -- Source badges -- */
    .source-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600; border-radius: 6px; padding: 3px 9px; white-space: nowrap; }
    .source-kernel   { background: #f0f6f1; color: #343539; border: 1px solid #c8d5c9; padding: 4px 8px; }
    .source-linkedin { background: #eaf2fc; color: #0a66c2; border: 1px solid #b3d0ef; }
    .source-badge svg { width: 11px; height: 11px; flex-shrink: 0; }
    .source-kernel img { height: 16px; width: auto; display: block; }

    .date-cell { font-size: 12px; color: #aaa; white-space: nowrap; }
    .empty-state { text-align: center; padding: 60px 20px; color: #bbb; font-size: 14px; display: none; }

    /* -- Expandable rows -- */
    tr.data-row { cursor: pointer; }
    tr.expand-row td { padding: 0; border-bottom: 1px solid #e8ece8; }
    tr.expand-row.hidden { display: none; }
    .expand-panel {
      padding: 16px 20px 20px;
      background: #fafcfa;
      border-top: 1px solid #eaeeea;
    }
    .expand-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 14px;
    }
    .option-chip {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 600;
      border-radius: 20px; padding: 4px 12px;
      cursor: pointer; border: 1.5px solid transparent;
      transition: all 0.15s; white-space: nowrap;
      background: #f0f2f0; color: #555; border-color: #e0e4e0;
    }
    .option-chip:hover { opacity: 0.8; }
    .option-chip.active {
      color: #fff;
    }
    .expand-fields-table {
      width: 100%; border-collapse: collapse;
    }
    .expand-fields-table td {
      padding: 7px 12px; border-bottom: 1px solid #f0f2f0;
      font-size: 12.5px; vertical-align: top;
    }
    .expand-fields-table tr:last-child td { border-bottom: none; }
    .expand-field-name {
      font-weight: 600; color: #343539; white-space: nowrap;
      width: 30%; font-size: 12px;
    }
    .expand-example {
      color: #555; line-height: 1.5;
    }
    .expand-example em { color: #999; font-style: italic; font-size: 11px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <img src="kernel-logo.png" class="navbar-logo" alt="Kernel" />
    <div class="brand-divider"></div>
    <span class="brand-sub">Datapoint Catalogue</span>
  </div>
  <div class="navbar-actions">
    <a href="https://docs.kernel.ai" target="_blank" rel="noopener" class="btn-text">Kernel Docs</a>
    <a href="https://app.kernel.ai" target="_blank" rel="noopener" class="btn-text">Kernel App</a>
    <a href="/admin/queue" class="btn-admin">Admin</a>
  </div>
</nav>

<div class="page-body">
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search datapoints..." oninput="filterTable()"/>
    </div>
    <select class="filter-select" id="categoryFilter" onchange="filterTable()">
      <option value="">All Categories</option>
      <option value="Entity Data">Entity Data</option>
      <option value="Firmographics">Firmographics</option>
      <option value="Technographics">Technographics</option>
      <option value="People Metrics">People Metrics</option>
      <option value="Hiring Signals">Hiring Signals</option>
      <option value="Custom Enrichment">Custom Enrichment</option>
    </select>
    <select class="filter-select" id="labelFilter" onchange="filterTable()">
      <option value="">All Labels</option>
      <option value="company-identity">Company Identity</option>
      <option value="location-geography">Location &amp; Geography</option>
      <option value="corporate-structure">Corporate Structure</option>
      <option value="financial-profile">Financial Profile</option>
      <option value="technology-infrastructure">Technology &amp; Infrastructure</option>
      <option value="sales-marketing">Sales &amp; Marketing</option>
      <option value="workforce-people">Workforce &amp; People</option>
      <option value="hiring-talent">Hiring &amp; Talent</option>
      <option value="customer-support">Customer Support</option>
      <option value="compliance-risk">Compliance &amp; Risk</option>
      <option value="ecommerce-retail">E-commerce &amp; Retail</option>
      <option value="operations">Operations</option>
      <option value="industry-market">Industry &amp; Market</option>
    </select>
  </div>

  <div class="stats-row">
    <div class="stat-pill">Datapoints <span class="count" id="totalCount">0</span></div>
    <div class="stat-pill">Categories <span class="count">6</span></div>
    <div class="stat-pill">Labels <span class="count">13</span></div>
  </div>

  <div class="card">
    <div class="table-scroll">
      <table id="catalogueTable">
        <colgroup>
          <col style="width:12%;"/>
          <col style="width:14%;"/>
          <col style="width:24%;"/>
          <col style="width:18%;"/>
          <col style="width:18%;"/>
          <col style="width:14%;"/>
        </colgroup>
        <thead>
          <tr>
            <th>Labels</th>
            <th>Datapoint</th>
            <th>Description</th>
            <th>Output Fields</th>
            <th>Example / Possible Values</th>
            <th>Source</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState">No datapoints match your filters.</div>
    </div>
  </div>
</div>

<script>
var allDatapoints = [];
var activeLabelFilter = '';

function loadDatapoints() {
  fetch('/api/datapoints?per_page=100')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      allDatapoints = data.datapoints || [];
      renderTable();
    })
    .catch(function(err) {
      console.error('Failed to load datapoints:', err);
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('emptyState').textContent = 'Failed to load datapoints.';
    });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

var LABEL_DISPLAY = {
  'company-identity': 'Company Identity',
  'location-geography': 'Location & Geography',
  'corporate-structure': 'Corporate Structure',
  'financial-profile': 'Financial Profile',
  'technology-infrastructure': 'Technology & Infrastructure',
  'sales-marketing': 'Sales & Marketing',
  'workforce-people': 'Workforce & People',
  'hiring-talent': 'Hiring & Talent',
  'customer-support': 'Customer Support',
  'compliance-risk': 'Compliance & Risk',
  'ecommerce-retail': 'E-commerce & Retail',
  'operations': 'Operations',
  'industry-market': 'Industry & Market'
};

var CAT_COLOURS = {
  'Entity Data':        { dot: '#98a59c', bg: '#f0f6f1', text: '#343539' },
  'Firmographics':      { dot: '#e8923a', bg: '#fff3e8', text: '#c06c1a' },
  'Technographics':     { dot: '#6a8fc8', bg: '#eef2fc', text: '#3a5fa0' },
  'People Metrics':     { dot: '#9b6fc8', bg: '#f3eefb', text: '#6a3fa0' },
  'Hiring Signals':     { dot: '#c86a6a', bg: '#fbeee8', text: '#a03a3a' },
  'Custom Enrichment':  { dot: '#5aa8c8', bg: '#eaf6fb', text: '#2a7a9a' }
};

function setLabelFilter(label) {
  activeLabelFilter = activeLabelFilter === label ? '' : label;
  document.getElementById('labelFilter').value = activeLabelFilter;
  renderTable();
}

function filterTable() {
  activeLabelFilter = document.getElementById('labelFilter').value;
  renderTable();
}

function renderTable() {
  var query = document.getElementById('searchInput').value.toLowerCase();
  var catFilter = document.getElementById('categoryFilter').value;
  var labelFilter = activeLabelFilter;

  var filtered = allDatapoints.filter(function(dp) {
    if (catFilter && dp.category !== catFilter) return false;
    if (labelFilter && (dp.labels || []).indexOf(labelFilter) === -1) return false;
    if (query) {
      var text = (dp.name + ' ' + dp.description + ' ' + (dp.labels || []).join(' ')).toLowerCase();
      if (text.indexOf(query) === -1) return false;
    }
    return true;
  });

  var categories = {};
  filtered.forEach(function(dp) {
    if (!categories[dp.category]) categories[dp.category] = [];
    categories[dp.category].push(dp);
  });

  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  var catOrder = ['Entity Data', 'Firmographics', 'Technographics', 'People Metrics', 'Hiring Signals', 'Custom Enrichment'];
  var totalVisible = 0;

  catOrder.forEach(function(cat) {
    var dps = categories[cat];
    if (!dps || dps.length === 0) return;

    var colours = CAT_COLOURS[cat] || CAT_COLOURS['Custom Enrichment'];

    var catRow = document.createElement('tr');
    catRow.className = 'cat-row';
    catRow.innerHTML = '<td colspan="6"><div class="cat-row-inner"><span class="cat-label">' +
      '<span class="cat-dot" style="background:' + colours.dot + ';"></span>' +
      escapeHtml(cat) +
      ' <span class="cat-count" style="background:' + colours.bg + ';color:' + colours.text + ';">' + dps.length + '</span>' +
      '</span></div></td>';
    tbody.appendChild(catRow);

    dps.forEach(function(dp) {
      totalVisible++;
      var tr = document.createElement('tr');
      tr.className = 'data-row';

      var labelsHtml = (dp.labels || []).map(function(l) {
        return '<span class="sub-label lbl-' + l + (activeLabelFilter === l ? ' active-filter' : '') +
          '" data-label="' + l + '" onclick="setLabelFilter(\'' + l + '\')">' +
          (LABEL_DISPLAY[l] || l) + '</span>';
      }).join('');

      var fields = dp.fields || [];
      var fieldsHtml = fields.length > 0
        ? '<ul class="fields-list">' + fields.map(function(f) {
            return '<li><span class="field-tag">' + escapeHtml(f.displayName) + '</span></li>';
          }).join('') + '</ul>'
        : '<span style="color:#ccc;font-size:12px;">&mdash;</span>';

      // Possible values: classifier options > example value > data type label
      var possibleValuesHtml = (function() {
        var sample = dp.classifierOptionsSample;
        if (sample) {
          try {
            var parsed = JSON.parse(sample);
            var opts = parsed.options || [];
            if (opts.length > 0) {
              var MAX_SHOW = 4;
              var extra = opts.length - MAX_SHOW;
              var html = '<div class="values-cell">' +
                opts.map(function(o, idx) {
                  var hidden = idx >= MAX_SHOW ? ' value-chip-hidden' : '';
                  return '<span class="value-chip' + hidden + '">' + escapeHtml(o.name || '') + '</span>';
                }).join('') +
                (extra > 0 ? '<span class="value-chip overflow" onclick="expandValues(this)">+' + extra + ' more</span>' : '') +
                '</div>';
              return html;
            }
          } catch(e) {}
        }
        // No schema options: show example value + evidence + url if available
        if (dp.exampleValue) {
          var parts = '<span style="font-size:12.5px;color:#343539;line-height:1.5;">' + escapeHtml(dp.exampleValue) + '</span>';
          if (dp.exampleEvidence) {
            parts += '<br><span style="font-size:11px;color:#999;font-style:italic;">' + escapeHtml(dp.exampleEvidence) + '</span>';
          }
          if (dp.exampleUrl) {
            var safeUrl = String(dp.exampleUrl).replace(/"/g, '%22');
            parts += '<br><a href="' + safeUrl + '" target="_blank" rel="noopener" style="font-size:11px;color:#5a8fd4;word-break:break-all;">' + escapeHtml(dp.exampleUrl) + '</a>';
          }
          return '<div>' + parts + '</div>';
        }
        // Fallback: data type label
        var dt = dp.dataType || 'text';
        var dtLabel = { 'string': 'Free text', 'number': 'Number', 'boolean': 'True / False', 'date': 'Date', 'string_array': 'List' }[dt.toLowerCase()] || 'Free text';
        return '<span class="data-type-label">' + escapeHtml(dtLabel) + '</span>';
      })();

      var linkedinSvg = '<svg viewBox="0 0 24 24" fill="currentColor" style="width:11px;height:11px;flex-shrink:0;"><path d="M20.447 20.452H16.89v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a1.98 1.98 0 0 1-1.983-1.98 1.98 1.98 0 0 1 3.962 0 1.98 1.98 0 0 1-1.979 1.98zm1.961 13.019H3.374V9h3.924v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>';
      var kernelLogo = '<img src="kernel-logo.png" style="height:16px;width:auto;display:block;" alt="Kernel AI" />';
      var sourceBadge = dp.source === 'linkedin'
        ? '<span class="source-badge source-linkedin">' + linkedinSvg + 'LinkedIn</span>'
        : dp.source === 'both'
        ? '<div style="display:flex;gap:4px;flex-wrap:wrap;"><span class="source-badge source-kernel">' + kernelLogo + '</span><span class="source-badge source-linkedin">' + linkedinSvg + 'LinkedIn</span></div>'
        : '<span class="source-badge source-kernel">' + kernelLogo + '</span>';

      var rowId = 'row_' + totalVisible;

      tr.setAttribute('data-rowid', rowId);
      tr.setAttribute('onclick', 'toggleRow("' + rowId + '")');
      tr.innerHTML =
        '<td><div class="sub-labels">' + labelsHtml + '</div></td>' +
        '<td><div class="dp-name">' + escapeHtml(dp.name) + '</div></td>' +
        '<td><span class="dp-desc">' + escapeHtml(dp.description) + '</span></td>' +
        '<td>' + fieldsHtml + '</td>' +
        '<td>' + possibleValuesHtml + '</td>' +
        '<td>' + sourceBadge + '</td>';

      tbody.appendChild(tr);

      // Build expand row
      var expandTr = document.createElement('tr');
      expandTr.className = 'expand-row hidden';
      expandTr.id = rowId;

      var expandTd = document.createElement('td');
      expandTd.colSpan = 6;

      // Get classifier options for chip interaction
      var chipOpts = [];
      if (dp.classifierOptionsSample) {
        try {
          var parsed = JSON.parse(dp.classifierOptionsSample);
          chipOpts = (parsed.options || []).map(function(o) { return o.name || ''; }).filter(Boolean);
        } catch(e) {}
      }

      var colours = CAT_COLOURS[dp.category] || CAT_COLOURS['Custom Enrichment'];

      // Build chips HTML
      var chipsHtml = '';
      if (chipOpts.length > 0) {
        chipsHtml = '<div class="expand-chips" id="chips_' + rowId + '">' +
          chipOpts.map(function(opt, idx) {
            var activeStyle = idx === 0 ? 'background:' + colours.dot + ';border-color:' + colours.dot + ';color:#fff;' : '';
            return '<span class="option-chip' + (idx === 0 ? ' active' : '') + '"' +
              ' style="' + activeStyle + '"' +
              ' data-opt="' + escapeHtml(opt) + '"' +
              ' data-colour="' + colours.dot + '"' +
              ' onclick="selectChip(event, \'' + rowId + '\', \'' + escapeHtml(opt) + '\')">' +
              escapeHtml(opt) + '</span>';
          }).join('') +
          '</div>';
      }

      // Build fields table — each field with its example
      var firstChip = chipOpts[0] || null;
      var fieldsTableHtml = '<table class="expand-fields-table">';
      var dpFields = dp.fields || [];
      dpFields.forEach(function(f) {
        var exampleHtml = '';
        if (f.exampleValue) {
          try {
            var exMap = JSON.parse(f.exampleValue);
            if (exMap && typeof exMap === 'object') {
              // Per-option: show for first chip by default, wrap in data attrs
              var firstVal = firstChip ? (exMap[firstChip] || '') : Object.values(exMap)[0] || '';
              exampleHtml = '<span class="expand-example per-opt-example" data-exmap="' +
                escapeHtml(JSON.stringify(exMap)) + '">' + escapeHtml(firstVal) + '</span>';
            } else {
              exampleHtml = '<span class="expand-example">' + escapeHtml(f.exampleValue) + '</span>';
            }
          } catch(e) {
            exampleHtml = '<span class="expand-example">' + escapeHtml(f.exampleValue) + '</span>';
          }
        }
        fieldsTableHtml +=
          '<tr>' +
          '<td class="expand-field-name"><span class="field-tag">' + escapeHtml(f.displayName) + '</span></td>' +
          '<td>' + exampleHtml + '</td>' +
          '</tr>';
      });
      fieldsTableHtml += '</table>';

      expandTd.innerHTML = '<div class="expand-panel">' + chipsHtml + fieldsTableHtml + '</div>';
      expandTr.appendChild(expandTd);
      tbody.appendChild(expandTr);
    });
  });

  document.getElementById('totalCount').textContent = totalVisible;
  document.getElementById('emptyState').style.display = totalVisible === 0 ? 'block' : 'none';
}

function toggleRow(rowId) {
  var el = document.getElementById(rowId);
  if (el) el.classList.toggle('hidden');
}

function selectChip(e, rowId, opt) {
  e.stopPropagation();
  var chipsEl = document.getElementById('chips_' + rowId);
  if (!chipsEl) return;

  // Update chip styles
  var chips = chipsEl.querySelectorAll('.option-chip');
  chips.forEach(function(c) {
    var colour = c.getAttribute('data-colour') || '#8fb49a';
    if (c.getAttribute('data-opt') === opt) {
      c.classList.add('active');
      c.style.background = colour;
      c.style.borderColor = colour;
      c.style.color = '#fff';
    } else {
      c.classList.remove('active');
      c.style.background = '#f0f2f0';
      c.style.borderColor = '#e0e4e0';
      c.style.color = '#555';
    }
  });

  // Update per-option examples in the panel
  var panel = chipsEl.closest('.expand-panel');
  if (!panel) return;
  var perOptEls = panel.querySelectorAll('.per-opt-example');
  perOptEls.forEach(function(el) {
    try {
      var map = JSON.parse(el.getAttribute('data-exmap') || '{}');
      el.textContent = map[opt] || '';
    } catch(e) {}
  });
}

function expandValues(btn) {
  var cell = btn.parentNode;
  var hidden = cell.querySelectorAll('.value-chip-hidden');
  for (var i = 0; i < hidden.length; i++) {
    hidden[i].classList.remove('value-chip-hidden');
  }
  btn.style.display = 'none';
}

loadDatapoints();
</script>
