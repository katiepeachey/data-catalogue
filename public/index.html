<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kernel AI – Datapoint Catalogue</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f6f6;
      color: #343539;
      min-height: 100vh;
    }

    /* -- Navbar -- */
    .navbar {
      background: #fff;
      border-bottom: 1px solid #eaebee;
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-brand { display: flex; align-items: center; gap: 16px; }
    .navbar-logo { height: 28px; width: auto; display: block; }
    .brand-divider { width: 1px; height: 20px; background: #eaebee; }
    .brand-sub { font-size: 11px; color: #a1a1a2; letter-spacing: 0.06em; text-transform: uppercase; }
    .navbar-actions { display: flex; align-items: center; gap: 24px; }
    .nav-link { font-size: 13px; color: #343539; text-decoration: none; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: color 0.15s; }
    .nav-link:hover { color: #98a59c; }
    .nav-link svg { width: 15px; height: 15px; opacity: 0.6; }
    .btn-text {
      font-size: 13px; color: #a1a1a2; text-decoration: none;
      font-weight: 500; transition: color 0.15s;
    }
    .btn-text:hover { color: #343539; }
    .btn-admin {
      display: inline-flex; align-items: center;
      background: #b5c4b6; color: #343539;
      border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 13px; font-weight: 600;
      font-family: inherit; text-decoration: none; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-admin:hover { opacity: 0.88; }

    /* -- Page -- */
    .page-body { padding: 28px; }

    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: #aaa; pointer-events: none; }
    .search-input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid #eaebee; border-radius: 8px; font-size: 13px; background: #fff; color: #343539; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .search-input:focus { border-color: #b5c4b6; box-shadow: 0 0 0 3px rgba(152,165,156,0.15); }
    .filter-select { padding: 9px 14px; border: 1px solid #eaebee; border-radius: 8px; font-size: 13px; background: #fff; color: #343539; outline: none; cursor: pointer; }
    .filter-select:focus { border-color: #b5c4b6; }

    .stats-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-pill { background: #fff; border: 1px solid #eaebee; border-radius: 20px; padding: 6px 16px; font-size: 13px; font-weight: 500; color: #343539; display: flex; align-items: center; gap: 8px; }
    .stat-pill .count { background: #e2ede3; color: #343539; border-radius: 10px; padding: 1px 8px; font-size: 12px; font-weight: 700; }

    /* -- Card / Table -- */
    .card { background: #fff; border-radius: 12px; border: 1px solid #eaebee; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .table-scroll { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 220px); }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 860px; }

    thead th { background: #fff; color: #999; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 16px; text-align: left; border-bottom: 1px solid #eaeeea; white-space: nowrap; position: sticky; top: 0; z-index: 10; }

    /* -- Category header rows -- */
    tr.cat-row td { padding: 0; border-top: 1px solid #e8ece8; border-bottom: 1px solid #e8ece8; position: relative; }
    tr.cat-row td:has(.cat-tip:hover) { z-index: 9999; }
    .cat-row-inner { padding: 10px 16px 8px; background: #f7faf7; }
    .cat-label { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #2d7a4f; }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; opacity: 0.8; flex-shrink: 0; }
    .cat-count { border-radius: 8px; padding: 1px 7px; font-size: 11px; font-weight: 700; }

    /* -- Data rows -- */
    tr.data-row td { padding: 14px 16px; vertical-align: top; border-bottom: 1px solid #f0f2f0; font-size: 13px; line-height: 1.5; }
    tr.data-row:last-child td { border-bottom: none; }
    tr.data-row:hover td { background: #fafcfa; }

    .dp-name { font-weight: 600; color: #343539; font-size: 13px; }
    .dp-desc { font-size: 12.5px; color: #666; line-height: 1.55; }

    /* -- Sub-label chips -- */
    .sub-labels { display: block; }
    .sub-label {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      border-radius: 4px; padding: 3px 8px;
      white-space: nowrap; line-height: 1.4;
      cursor: pointer; transition: opacity 0.15s;
      margin: 0 4px 4px 0;
    }
    .sub-label:hover { opacity: 0.75; }

    /* 13 label colours — no border, design-system palette */
    .lbl-company-identity        { background: #ccfbf1; color: #0f766e; }
    .lbl-location-geography      { background: #fef3c7; color: #92400e; }
    .lbl-corporate-structure     { background: #ede9fe; color: #5b21b6; }
    .lbl-financial-profile       { background: #fef9c3; color: #713f12; }
    .lbl-technology-infrastructure { background: #e0f2fe; color: #0369a1; }
    .lbl-sales-marketing         { background: #fce7f3; color: #9d174d; }
    .lbl-workforce-people        { background: #dcfce7; color: #166534; }
    .lbl-hiring-talent           { background: #fee2e2; color: #991b1b; }
    .lbl-customer-support        { background: #dbeafe; color: #1e40af; }
    .lbl-compliance-risk         { background: #ffedd5; color: #9a3412; }
    .lbl-ecommerce-retail        { background: #cffafe; color: #164e63; }
    .lbl-operations              { background: #f1f5f9; color: #475569; }
    .lbl-industry-market         { background: #e0e7ff; color: #3730a3; }

    .sub-label.active-filter { outline: 2px solid currentColor; outline-offset: 1px; }

    /* -- Output fields -- */
    .fields-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0; }
    .fields-list li { display: flex; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #f0f2f0; }
    .fields-list li.expand-btn { border-bottom: none; padding-top: 6px; padding-bottom: 2px; }
    .field-tag { display: inline-block; font-size: 12px; color: #343539; background: #f0f6f1; border: 1px solid #c8d5c9; border-radius: 20px; padding: 2px 7px; width: fit-content; }

    /* -- Possible values chips -- */
    .value-chip {
      display: inline-flex; font-size: 10px; font-weight: 600;
      background: #f0f2f0; color: #555; border: 1px solid #e0e4e0;
      border-radius: 10px; padding: 2px 8px; white-space: nowrap;
    }
    .value-chip-hidden { display: none; }
    .value-chip.overflow { background: #eef2fc; color: #3a5fa0; border-color: #b8c8ef; cursor: pointer; transition: opacity 0.15s; }
    .value-chip.overflow:hover { opacity: 0.75; }
    .values-cell { display: flex; flex-wrap: wrap; gap: 4px; align-items: flex-start; }
    .data-type-label { font-size: 11px; color: #aaa; font-style: italic; }

    /* -- Source badges -- */
    .source-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600; border-radius: 6px; padding: 3px 9px; white-space: nowrap; }
    .source-kernel   { background: #f0f6f1; color: #555; border: 1px solid #c8d5c9; font-size: 11px; font-weight: 500; padding: 3px 8px; }
    .source-linkedin { background: #eaf2fc; color: #0a66c2; border: 1px solid #b3d0ef; }
    .source-badge svg { width: 11px; height: 11px; flex-shrink: 0; }

    .date-cell { font-size: 12px; color: #aaa; white-space: nowrap; }
    .empty-state { text-align: center; padding: 60px 20px; color: #bbb; font-size: 14px; display: none; }

    /* -- Option chips (inline in table) -- */
    .option-chip {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 600;
      border-radius: 20px; padding: 4px 12px;
      cursor: pointer; border: 1.5px solid #e0e4e0;
      transition: all 0.15s; white-space: nowrap;
      background: #f0f2f0; color: #555;
    }
    .option-chip:hover { opacity: 0.8; }
    .option-chip.active { color: #fff; }
    /* -- Options/Values column per-field list -- */
    .fex-list { display: flex; flex-direction: column; gap: 0; }
    .fex-item { min-height: 22px; display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f2f0; }
    .fex-empty { min-height: 22px; }
    .fex-val { font-size: 12px; color: #555; font-style: italic; line-height: 1.4; }
    .fex-reasoning .per-opt-ex {
      font-size: 12px; color: #555; font-style: italic;
      line-height: 1.4; white-space: normal; word-break: break-word;
    }
    .values-cell { display: flex; flex-wrap: wrap; gap: 4px; }

    /* -- Per-field inline examples -- */
    .field-example {
      display: inline; font-size: 11.5px; color: #888;
      font-style: italic; margin-left: 4px;
    }

    /* -- SF type tooltip -- */
    .sf-type-tip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 50%;
      border: 1.5px solid #c8d5c9; color: #8fb49a;
      font-size: 9px; font-weight: 700; font-style: normal;
      line-height: 1;
      cursor: default; position: relative; margin-left: 4px;
      vertical-align: middle; user-select: none; flex-shrink: 0;
    }

    /* -- Column header info icon -- */
    .th-tip {
      display: none;
      align-items: center; justify-content: center;
      width: 13px; height: 13px; border-radius: 50%;
      border: 1.5px solid #ccc; color: #aaa;
      font-size: 8px; font-weight: 700; font-style: normal;
      text-transform: none; line-height: 1;
      cursor: default; position: relative;
      margin-left: 4px; vertical-align: middle;
      user-select: none; flex-shrink: 0;
    }
    thead tr:hover .th-tip.has-text { display: inline-flex; }

    /* -- Category header info icon -- */
    .cat-tip {
      display: none; align-items: center; justify-content: center;
      width: 13px; height: 13px; border-radius: 50%;
      border: 1.5px solid #a0c8a8; color: #2d7a4f;
      font-size: 8px; font-weight: 700; font-style: normal;
      line-height: 1; text-transform: none;
      cursor: default; position: relative;
      margin-left: 6px; vertical-align: middle;
      user-select: none; flex-shrink: 0;
    }
    tr.cat-row:hover .cat-tip { display: inline-flex; }

    /* -- Shared JS tooltip -- */
    #info-tooltip {
      display: none;
      position: fixed;
      background: #343539; color: #fff;
      font-size: 11px; font-weight: 500;
      border-radius: 6px; padding: 6px 10px;
      white-space: normal; word-break: break-word; max-width: 240px;
      text-align: left; z-index: 9999;
      pointer-events: none; line-height: 1.45;
    }

    /* -- Category sub-text -- */
    .cat-subtext {
      font-size: 11px; color: #2d7a4f; font-style: italic;
      margin-top: 4px; font-weight: 400; letter-spacing: 0;
      text-transform: none;
    }

    /* -- Field name styles (plain text) -- */
    .fields-list li { align-items: center; }
    .field-name { font-size: 13px; color: #343539; }
    .field-name-sub { font-size: 12px; color: #aaa; padding-left: 4px; }

    /* -- SF type tip: only visible on row hover -- */
    tr.data-row .sf-type-tip { display: none; }
    tr.data-row:hover .sf-type-tip { display: inline-flex; }

    /* -- Value dropdown -- */
    .val-dropdown { position: relative; display: inline-block; }
    .val-dropdown-btn {
      display: inline-flex; align-items: center; gap: 5px;
      border: 1px solid #dde3dd; border-radius: 6px;
      padding: 3px 8px 3px 10px; font-size: 12px; color: #343539;
      background: #fff; cursor: pointer; white-space: nowrap; user-select: none;
    }
    .val-dropdown-btn:hover { border-color: #b5c4b6; }
    .val-dropdown-btn svg { width: 10px; height: 10px; color: #aaa; flex-shrink: 0; }
    .val-dropdown-list {
      display: none; position: absolute; top: calc(100% + 4px); left: 0;
      background: #fff; border: 1px solid #e0e4e0; border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1); z-index: 200; min-width: 130px; overflow: hidden;
    }
    .val-dropdown-list.open { display: block; }
    .val-dropdown-item { padding: 7px 12px; font-size: 12px; color: #343539; cursor: pointer; }
    .val-dropdown-item:hover { background: #f5f6f6; }
    .val-dropdown-item.active { font-weight: 600; color: #2d7a4f; }

    /* -- Row expand/collapse -- */
    .fields-list li.field-extra { display: none; }
    tr.row-expanded .fields-list li.field-extra { display: flex; }
    .fex-list > div.fex-extra { display: none; }
    tr.row-expanded .fex-list > div.fex-extra { display: flex; }
    .expand-btn { list-style: none; cursor: pointer; padding-top: 6px; }
    .expand-btn span { font-size: 11px; color: #8fb49a; font-weight: 600; }
    .expand-btn .less-label { display: none; }
    tr.row-expanded .expand-btn .more-label { display: none; }
    tr.row-expanded .expand-btn .less-label { display: inline; }

    /* -- Category collapse arrow -- */
    .cat-arrow { margin-left: 6px; font-size: 11px; color: #2d7a4f; display: inline-block; transition: transform 0.2s; }
    .cat-row-inner { cursor: pointer; }

    /* -- Source plain text -- */
    .source-plain { font-size: 12px; color: #666; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <img src="kernel-logo.png" class="navbar-logo" alt="Kernel" />
    <div class="brand-divider"></div>
    <span class="brand-sub">Datapoint Catalogue</span>
  </div>
  <div class="navbar-actions">
    <a href="https://docs.kernel.ai" target="_blank" rel="noopener" class="btn-text">Kernel Docs</a>
    <a href="https://app.kernel.ai" target="_blank" rel="noopener" class="btn-text">Kernel App</a>
    <a href="/admin/queue" class="btn-admin">Admin</a>
  </div>
</nav>

<div class="page-body">
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search datapoints..." oninput="filterTable()"/>
    </div>
    <select class="filter-select" id="categoryFilter" onchange="filterTable()">
      <option value="">All Categories</option>
      <option value="Entity Data">Entity Data</option>
      <option value="Firmographics">Firmographics</option>
      <option value="Technographics">Technographics</option>
      <option value="People Metrics">People Metrics</option>
      <option value="Hiring Signals">Hiring Signals</option>
      <option value="Custom Enrichment">Custom Enrichment</option>
    </select>
    <select class="filter-select" id="labelFilter" onchange="filterTable()">
      <option value="">All Labels</option>
      <option value="company-identity">Entity Identity</option>
      <option value="location-geography">Location &amp; Geography</option>
      <option value="corporate-structure">Corporate Structure</option>
      <option value="financial-profile">Financial Profile</option>
      <option value="technology-infrastructure">Technology &amp; Infrastructure</option>
      <option value="sales-marketing">Sales &amp; Marketing</option>
      <option value="workforce-people">Workforce &amp; People</option>
      <option value="hiring-talent">Hiring &amp; Talent</option>
      <option value="customer-support">Customer Support</option>
      <option value="compliance-risk">Compliance &amp; Risk</option>
      <option value="ecommerce-retail">E-commerce &amp; Retail</option>
      <option value="operations">Operations</option>
      <option value="industry-market">Industry &amp; Market</option>
    </select>
  </div>

  <div class="card">
    <div class="table-scroll">
      <table id="catalogueTable">
        <colgroup>
          <col style="width:12%;"/>
          <col style="width:14%;"/>
          <col style="width:24%;"/>
          <col style="width:18%;"/>
          <col style="width:18%;"/>
          <col style="width:14%;"/>
        </colgroup>
        <thead>
          <tr>
            <th>Labels <i class="th-tip" id="tip-labels"></i></th>
            <th>Datapoint <i class="th-tip" id="tip-datapoint"></i></th>
            <th>Description <i class="th-tip" id="tip-description"></i></th>
            <th>Output Fields <i class="th-tip" id="tip-output_fields"></i></th>
            <th>Value <i class="th-tip" id="tip-example_values"></i></th>
            <th>Source <i class="th-tip" id="tip-source"></i></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState">No datapoints match your filters.</div>
    </div>
  </div>
</div>

<div id="info-tooltip"></div>

<script>
var allDatapoints = [];
var activeLabelFilter = '';

function loadDatapoints() {
  fetch('/api/datapoints?per_page=100')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      allDatapoints = data.datapoints || [];
      updateFilterCounts();
      renderTable();
    })
    .catch(function(err) {
      console.error('Failed to load datapoints:', err);
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('emptyState').textContent = 'Failed to load datapoints.';
    });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

var LABEL_DISPLAY = {
  'company-identity': 'Entity Identity',
  'location-geography': 'Location & Geography',
  'corporate-structure': 'Corporate Structure',
  'financial-profile': 'Financial Profile',
  'technology-infrastructure': 'Technology & Infrastructure',
  'sales-marketing': 'Sales & Marketing',
  'workforce-people': 'Workforce & People',
  'hiring-talent': 'Hiring & Talent',
  'customer-support': 'Customer Support',
  'compliance-risk': 'Compliance & Risk',
  'ecommerce-retail': 'E-commerce & Retail',
  'operations': 'Operations',
  'industry-market': 'Industry & Market'
};

var CAT_SUBTEXT = {
  'Technographics': 'Technographics can be customised based on any publicly available criteria. These are specific examples.',
  'People Metrics': 'People Metrics can be customised based on any publicly available criteria. These are specific examples.',
  'Hiring Signals': 'Hiring Signals can be customised based on any publicly available criteria. These are specific examples.'
};

var CAT_HELPTEXT_KEY = {
  'Entity Data':       'cat_entity_data',
  'Firmographics':     'cat_firmographics',
  'Technographics':    'cat_technographics',
  'People Metrics':    'cat_people_metrics',
  'Hiring Signals':    'cat_hiring_signals',
  'Custom Enrichment': 'cat_custom_enrichment'
};

var columnHelptext = {};

var CAT_COLOURS = {
  'Entity Data':        { dot: '#98a59c', bg: '#f0f6f1', text: '#343539' },
  'Firmographics':      { dot: '#e8923a', bg: '#fff3e8', text: '#c06c1a' },
  'Technographics':     { dot: '#6a8fc8', bg: '#eef2fc', text: '#3a5fa0' },
  'People Metrics':     { dot: '#9b6fc8', bg: '#f3eefb', text: '#6a3fa0' },
  'Hiring Signals':     { dot: '#c86a6a', bg: '#fbeee8', text: '#a03a3a' },
  'Custom Enrichment':  { dot: '#5aa8c8', bg: '#eaf6fb', text: '#2a7a9a' }
};

var collapsedCats = {};

function toggleCat(cat) {
  collapsedCats[cat] = !collapsedCats[cat];
  var isCollapsed = collapsedCats[cat];
  document.querySelectorAll('tr.data-row[data-cat="' + cat + '"]').forEach(function(row) {
    row.style.display = isCollapsed ? 'none' : '';
  });
  var arrow = document.querySelector('.cat-arrow[data-cat="' + cat + '"]');
  if (arrow) arrow.textContent = isCollapsed ? '▸' : '▾';
}

function setLabelFilter(label) {
  activeLabelFilter = activeLabelFilter === label ? '' : label;
  document.getElementById('labelFilter').value = activeLabelFilter;
  renderTable();
}

function filterTable() {
  activeLabelFilter = document.getElementById('labelFilter').value;
  renderTable();
}

function updateFilterCounts() {
  var total = allDatapoints.length;
  document.getElementById('searchInput').placeholder = 'Search ' + total + ' datapoints...';

  var catCounts = {};
  allDatapoints.forEach(function(dp) { catCounts[dp.category] = (catCounts[dp.category] || 0) + 1; });
  Array.from(document.getElementById('categoryFilter').options).forEach(function(opt) {
    if (opt.value) opt.text = opt.value + ' (' + (catCounts[opt.value] || 0) + ')';
  });

  var labelCounts = {};
  allDatapoints.forEach(function(dp) { (dp.labels || []).forEach(function(l) { labelCounts[l] = (labelCounts[l] || 0) + 1; }); });
  Array.from(document.getElementById('labelFilter').options).forEach(function(opt) {
    if (opt.value) opt.text = (LABEL_DISPLAY[opt.value] || opt.value) + ' (' + (labelCounts[opt.value] || 0) + ')';
  });
}

function renderTable() {
  var query = document.getElementById('searchInput').value.toLowerCase();
  var catFilter = document.getElementById('categoryFilter').value;
  var labelFilter = activeLabelFilter;

  var filtered = allDatapoints.filter(function(dp) {
    if (catFilter && dp.category !== catFilter) return false;
    if (labelFilter && (dp.labels || []).indexOf(labelFilter) === -1) return false;
    if (query) {
      var text = (dp.name + ' ' + dp.description + ' ' + (dp.labels || []).join(' ')).toLowerCase();
      if (text.indexOf(query) === -1) return false;
    }
    return true;
  });

  var categories = {};
  filtered.forEach(function(dp) {
    if (!categories[dp.category]) categories[dp.category] = [];
    categories[dp.category].push(dp);
  });

  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  var catOrder = ['Entity Data', 'Firmographics', 'Technographics', 'People Metrics', 'Hiring Signals', 'Custom Enrichment'];
  var totalVisible = 0;

  catOrder.forEach(function(cat) {
    var dps = categories[cat];
    if (!dps || dps.length === 0) return;

    var colours = CAT_COLOURS[cat] || CAT_COLOURS['Custom Enrichment'];

    var catRow = document.createElement('tr');
    catRow.className = 'cat-row';
    var subtext = CAT_SUBTEXT[cat] ? '<div class="cat-subtext">' + escapeHtml(CAT_SUBTEXT[cat]) + '</div>' : '';
    var catHtKey = CAT_HELPTEXT_KEY[cat] || '';
    var catHtText = catHtKey && columnHelptext[catHtKey] ? columnHelptext[catHtKey] : '';
    var catTipHtml = catHtText ? '<i class="cat-tip" data-tip="' + escapeHtml(catHtText) + '">i</i>' : '';
    catRow.innerHTML = '<td colspan="6"><div class="cat-row-inner" onclick="toggleCat(\'' + escapeHtml(cat) + '\')"><span class="cat-label">' +
      '<span class="cat-dot" style="background:' + colours.dot + ';"></span>' +
      escapeHtml(cat) +
      ' <span class="cat-count" style="background:' + colours.bg + ';color:' + colours.text + ';">' + dps.length + '</span>' +
      catTipHtml +
      '<span class="cat-arrow" data-cat="' + escapeHtml(cat) + '">▾</span>' +
      '</span>' + subtext + '</div></td>';
    tbody.appendChild(catRow);

    dps.forEach(function(dp) {
      totalVisible++;
      var rowId = 'dprow_' + totalVisible;
      var tr = document.createElement('tr');
      tr.className = 'data-row';
      tr.id = rowId;
      tr.setAttribute('data-cat', cat);
      if (collapsedCats[cat]) tr.style.display = 'none';

      var colours = CAT_COLOURS[dp.category] || CAT_COLOURS['Custom Enrichment'];

      // Parse classifier options
      var chipOpts = [];
      if (dp.classifierOptionsSample) {
        try {
          var parsed = JSON.parse(dp.classifierOptionsSample);
          chipOpts = (parsed.options || []).map(function(o) { return o.name || ''; }).filter(Boolean);
        } catch(e) {}
      }
      var firstChip = chipOpts.length > 0 ? chipOpts[0] : null;

      var labelsHtml = (dp.labels || []).map(function(l) {
        return '<span class="sub-label lbl-' + l + (activeLabelFilter === l ? ' active-filter' : '') +
          '" data-label="' + l + '" onclick="setLabelFilter(\'' + l + '\')">' +
          (LABEL_DISPLAY[l] || l) + '</span>';
      }).join('');

      var dpFields = dp.fields || [];
      var MAX_FIELDS = 3;
      var extraCount = Math.max(0, dpFields.length - MAX_FIELDS);

      var fieldsHtml = dpFields.length > 0 ? (function() {
        var items = dpFields.map(function(f, idx) {
          var isReasoning = f.isSubField || /reasoning|confidence/i.test(f.fieldName + f.displayName);
          var extraClass = idx >= MAX_FIELDS ? ' field-extra' : '';
          var tipHtml = f.sfFieldType ? '<i class="sf-type-tip" data-tip="' + escapeHtml(f.sfFieldType) + '">i</i>' : '';
          if (isReasoning) {
            return '<li class="field-item' + extraClass + '"><span class="field-name-sub">↳ ' + escapeHtml(f.displayName) + '</span>' + tipHtml + '</li>';
          }
          return '<li class="field-item' + extraClass + '"><span class="field-name">' + escapeHtml(f.displayName) + '</span>' + tipHtml + '</li>';
        }).join('');
        var expandBtn = extraCount > 0
          ? '<li class="expand-btn" onclick="toggleExpandRow(\'' + rowId + '\')">' +
            '<span class="more-label">↓ ' + extraCount + ' more</span>' +
            '<span class="less-label">↑ Less</span></li>'
          : '';
        return '<ul class="fields-list">' + items + expandBtn + '</ul>';
      })() : '<span style="color:#ccc;font-size:12px;">&mdash;</span>';

      // Value column
      var CHIP_ACTIVE_COLOR = '#8fb49a';
      var optionsHtml = (function() {
        if (dpFields.length === 0) {
          if (dp.exampleValue) return '<span style="font-size:12px;color:#343539;">' + escapeHtml(dp.exampleValue) + '</span>';
          return '<span style="color:#ccc;font-size:12px;">&mdash;</span>';
        }

        if (chipOpts.length > 0) {
          var chevronSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';
          var dropdownHtml = '<div class="val-dropdown">' +
            '<div class="val-dropdown-btn" onclick="toggleValDropdown(\'' + rowId + '\')">' +
            '<span class="val-dropdown-text">' + escapeHtml(chipOpts[0]) + '</span>' + chevronSvg +
            '</div>' +
            '<div class="val-dropdown-list" id="vdl_' + rowId + '">' +
            chipOpts.map(function(opt, idx) {
              return '<div class="val-dropdown-item' + (idx === 0 ? ' active' : '') + '" data-opt="' + escapeHtml(opt) + '" onclick="selectValOption(this,\'' + rowId + '\')">' + escapeHtml(opt) + '</div>';
            }).join('') +
            '</div></div>';

          var dropdownPlaced = false;
          var rows = dpFields.map(function(f, idx) {
            var extraClass = idx >= MAX_FIELDS ? ' fex-extra' : '';
            if (f.exampleValue) {
              try {
                var exMap = JSON.parse(f.exampleValue);
                if (exMap && typeof exMap === 'object' && !Array.isArray(exMap)) {
                  var firstVal = firstChip ? (exMap[firstChip] || '') : '';
                  if (!firstVal) { var vals = Object.values(exMap); firstVal = vals.length ? String(vals[0]) : ''; }
                  return '<div class="fex-item fex-reasoning' + extraClass + '">' +
                    '<span class="per-opt-ex" data-exmap="' + JSON.stringify(exMap).replace(/&/g, '&amp;').replace(/"/g, '&quot;') + '">' +
                    escapeHtml(String(firstVal)) + '</span></div>';
                }
              } catch(e) {}
            }
            if (!dropdownPlaced) {
              dropdownPlaced = true;
              return '<div class="fex-item' + extraClass + '">' + dropdownHtml + '</div>';
            }
            return '<div class="fex-item fex-empty' + extraClass + '"></div>';
          }).join('');

          if (!dropdownPlaced) {
            return '<div class="fex-list"><div class="fex-item">' + dropdownHtml + '</div>' + rows + '</div>';
          }
          return '<div class="fex-list">' + rows + '</div>';
        }

        var fieldExRows = dpFields.map(function(f, idx) {
          var extraClass = idx >= MAX_FIELDS ? ' fex-extra' : '';
          if (!f.exampleValue) return '<div class="fex-item fex-empty' + extraClass + '"></div>';
          var ex = '';
          try {
            var exMap = JSON.parse(f.exampleValue);
            if (exMap && typeof exMap === 'object' && !Array.isArray(exMap)) {
              ex = String(Object.values(exMap)[0] || '');
            } else {
              ex = String(f.exampleValue);
            }
          } catch(e) { ex = String(f.exampleValue); }
          return ex
            ? '<div class="fex-item' + extraClass + '"><span class="fex-val">' + escapeHtml(ex) + '</span></div>'
            : '<div class="fex-item fex-empty' + extraClass + '"></div>';
        }).join('');

        return '<div class="fex-list">' + fieldExRows + '</div>';
      })();

      var sourceText = dp.source === 'linkedin' ? 'LinkedIn'
        : dp.source === 'both' ? 'Kernel, LinkedIn'
        : 'Kernel';
      var sourceBadge = '<span class="source-plain">' + escapeHtml(sourceText) + '</span>';

      tr.innerHTML =
        '<td><div class="sub-labels">' + labelsHtml + '</div></td>' +
        '<td><div class="dp-name">' + escapeHtml(dp.name) + '</div></td>' +
        '<td><span class="dp-desc">' + escapeHtml(dp.description) + '</span></td>' +
        '<td>' + fieldsHtml + '</td>' +
        '<td>' + optionsHtml + '</td>' +
        '<td>' + sourceBadge + '</td>';

      tbody.appendChild(tr);
      syncFieldExamples(rowId);
    });
  });

  document.getElementById('emptyState').style.display = totalVisible === 0 ? 'block' : 'none';
}

function selectChip(chipEl, rowId) {
  var opt = chipEl.getAttribute('data-opt');
  var chipsEl = document.getElementById('chips_' + rowId);
  if (!chipsEl) return;

  // Update chip styles
  var chips = chipsEl.querySelectorAll('.option-chip');
  chips.forEach(function(c) {
    var colour = c.getAttribute('data-colour') || '#8fb49a';
    if (c.getAttribute('data-opt') === opt) {
      c.classList.add('active');
      c.style.background = colour;
      c.style.borderColor = colour;
      c.style.color = '#fff';
    } else {
      c.classList.remove('active');
      c.style.background = '#f0f2f0';
      c.style.borderColor = '#e0e4e0';
      c.style.color = '#555';
    }
  });

  // Update per-option inline examples in the same row
  var row = document.getElementById(rowId);
  if (!row) return;
  var perOptEls = row.querySelectorAll('.per-opt-ex');
  perOptEls.forEach(function(el) {
    try {
      var map = JSON.parse(el.getAttribute('data-exmap') || '{}');
      el.textContent = map[opt] || '';
    } catch(e) {}
  });
}

function toggleExpandRow(rowId) {
  var tr = document.getElementById(rowId);
  if (!tr) return;
  tr.classList.toggle('row-expanded');
  syncFieldExamples(rowId);
}

function toggleValDropdown(rowId) {
  var list = document.getElementById('vdl_' + rowId);
  if (!list) return;
  var isOpen = list.classList.contains('open');
  document.querySelectorAll('.val-dropdown-list.open').forEach(function(el) { el.classList.remove('open'); });
  if (!isOpen) list.classList.add('open');
}

function selectValOption(item, rowId) {
  var opt = item.getAttribute('data-opt');
  var btn = document.querySelector('#vdl_' + rowId).previousElementSibling.querySelector('.val-dropdown-text');
  if (btn) btn.textContent = opt;
  document.querySelectorAll('#vdl_' + rowId + ' .val-dropdown-item').forEach(function(el) {
    el.classList.toggle('active', el.getAttribute('data-opt') === opt);
  });
  var row = document.getElementById(rowId);
  if (row) row.querySelectorAll('.per-opt-ex').forEach(function(el) {
    try { var map = JSON.parse(el.getAttribute('data-exmap') || '{}'); el.textContent = map[opt] || ''; } catch(e) {}
  });
  document.getElementById('vdl_' + rowId).classList.remove('open');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.val-dropdown')) {
    document.querySelectorAll('.val-dropdown-list.open').forEach(function(el) { el.classList.remove('open'); });
  }
});

// Sync output field rows with value rows so they stay vertically aligned
function syncFieldExamples(rowId) {
  var row = document.getElementById(rowId);
  if (!row) return;
  var fieldItems = Array.from(row.querySelectorAll('.fields-list li:not(.expand-btn)'));
  var fexItems = Array.from(row.querySelectorAll('.fex-list > div'));
  fieldItems.forEach(function(el) { el.style.minHeight = ''; });
  fexItems.forEach(function(el) { el.style.minHeight = ''; });
  var count = Math.min(fieldItems.length, fexItems.length);
  for (var i = 0; i < count; i++) {
    var fi = fieldItems[i], fx = fexItems[i];
    if (getComputedStyle(fi).display === 'none' || getComputedStyle(fx).display === 'none') continue;
    var maxH = Math.max(fi.offsetHeight, fx.offsetHeight);
    if (maxH > 0) { fi.style.minHeight = maxH + 'px'; fx.style.minHeight = maxH + 'px'; }
  }
}

// Shared tooltip for .th-tip and .cat-tip
(function() {
  var tooltip = document.getElementById('info-tooltip');

  function showTip(el) {
    var text = el.getAttribute('data-tip');
    if (!text) return;
    tooltip.textContent = text;
    tooltip.style.display = 'block';
    var rect = el.getBoundingClientRect();
    var top = rect.bottom + 6;
    var left = rect.left;
    // Keep within right edge of viewport
    tooltip.style.left = '0px';
    tooltip.style.top = top + 'px';
    tooltip.style.display = 'block';
    var tipRect = tooltip.getBoundingClientRect();
    var clampedLeft = Math.min(left, window.innerWidth - tipRect.width - 8);
    tooltip.style.left = Math.max(8, clampedLeft) + 'px';
  }

  function hideTip() {
    tooltip.style.display = 'none';
  }

  document.addEventListener('mouseover', function(e) {
    var el = e.target.closest('.th-tip, .cat-tip, .sf-type-tip');
    if (el) showTip(el);
  });

  document.addEventListener('mouseout', function(e) {
    var el = e.target.closest('.th-tip, .cat-tip, .sf-type-tip');
    if (el) hideTip();
  });
})();

loadDatapoints();

function loadHelptext() {
  fetch('/api/helptext')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      columnHelptext = data;
      var colKeys = ['labels', 'datapoint', 'description', 'output_fields', 'example_values', 'source'];
      colKeys.forEach(function(key) {
        var text = data[key] || '';
        var el = document.getElementById('tip-' + key);
        if (!el || !text) return;
        el.setAttribute('data-tip', text);
        el.textContent = 'i';
        el.classList.add('has-text');
      });
    })
    .catch(function() {});
}

loadHelptext();
</script>
